# golangci-lint v2 configuration
version: "2"

run:
  timeout: 5m
  tests: true

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    # Error checking - catches ignored errors
    - errcheck          # Checks that you check all errors
    - errorlint         # Suggests wrapping of errors

    # General code quality
    - govet             # Reports suspicious constructs
    - staticcheck       # Static analysis (includes error checking)
    - unused            # Checks for unused constants, variables, functions and types
    - ineffassign       # Detects ineffectual assignments

    # Style and best practices
    # - gosec           # Disabled: panics with Go 1.25 (securego/gosec#1xxx)
    - unconvert         # Remove unnecessary type conversions
    - unparam           # Reports unused function parameters

  settings:
    errcheck:
      # Check for ignored errors
      check-type-assertions: false
      check-blank: false
      # Ignore these functions (add as needed)
      exclude-functions:
        - fmt.Print
        - fmt.Printf
        - fmt.Println
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - os.Remove
        - os.RemoveAll
        - os.Chmod
        - os.Chown
        - os.Chtimes
        - os.Mkdir
        - os.MkdirAll
        - os.Truncate
        - io.Close
        - io.Write
        - io.WriteString
        - (*os.File).Close
        - (*net.TCPConn).Close
        - (net.Conn).Close
        - (*bytes.Buffer).Write
        - (*bytes.Buffer).WriteString
        - (*strings.Builder).Write
        - (*strings.Builder).WriteString

    errorlint:
      # Check for error type assertions
      errorf: true
      asserts: true
      comparison: true

    # gosec disabled due to Go 1.25 compatibility panic
    # gosec:
    #   severity: medium
    #   confidence: medium
    #   excludes:
    #     - G104
    #     - G204

  exclusions:
    # Exclude some common false positives
    rules:
      # Allow errors in test files for some cases
      - path: _test\.go
        linters:
          - errcheck
        text: "Error return value of .* is not checked"

    # Exclude some directories from specific linters
    paths:
      - vendor
      - bin
      - test/docker

issues:
  # Maximum issues count per one linter
  max-issues-per-linter: 50
  max-same-issues: 50

output:
  formats:
    text:
      path: stdout
      print-issued-lines: true
      print-linter-name: true
